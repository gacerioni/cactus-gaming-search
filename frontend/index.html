<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cactus Gaming - Search Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .autocomplete {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .autocomplete.show { display: block; }
        .autocomplete-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .autocomplete-item:hover {
            background: #f5f5f5;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-search {
            background: #667eea;
            color: white;
        }
        .btn-vector {
            background: #764ba2;
            color: white;
        }
        .results {
            margin-top: 30px;
        }
        .result-item {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .result-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .result-provider {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .result-description {
            color: #666;
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stats {
            color: #999;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .badges {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-fts {
            background: #e3f2fd;
            color: #1976d2;
        }
        .badge-fuzzy {
            background: #fff3e0;
            color: #f57c00;
        }
        .badge-vector {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        .score {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌵 Cactus Gaming</h1>
        <p class="subtitle">Search-as-a-Service com Redis</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Digite para buscar... (ex: mengao, bambi, tigrinho)">
            <div class="autocomplete" id="autocomplete"></div>
        </div>

        <div class="buttons">
            <button class="btn-search" onclick="search()">🔍 Buscar</button>
        </div>

        <p style="text-align: center; color: #666; font-size: 14px; margin-top: 10px;">
            💡 Busca inteligente: Autocomplete → Sinônimos → Fuzzy → Vector Search
        </p>
        
        <div id="error"></div>
        <div id="results"></div>
    </div>

    <script>
        // CONFIGURAÇÃO: URL do Cloudflare Worker (PRODUÇÃO)
        const API_URL = 'https://cactus-worker.platformengineer.workers.dev';

        // Para teste local descomente a linha abaixo:
        // const API_URL = 'http://localhost:3000';
        
        const searchInput = document.getElementById('searchInput');
        const autocompleteDiv = document.getElementById('autocomplete');
        const resultsDiv = document.getElementById('results');
        const errorDiv = document.getElementById('error');
        
        let debounceTimer;
        
        // Autocomplete
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value;
            
            if (query.length < 2) {
                autocompleteDiv.classList.remove('show');
                return;
            }
            
            debounceTimer = setTimeout(() => {
                fetch(`${API_URL}/api/autocomplete?q=${encodeURIComponent(query)}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.suggestions && data.suggestions.length > 0) {
                            autocompleteDiv.innerHTML = data.suggestions
                                .map(s => `<div class="autocomplete-item" onclick="selectSuggestion('${s.text}')">${s.text}</div>`)
                                .join('');
                            autocompleteDiv.classList.add('show');
                        } else {
                            autocompleteDiv.classList.remove('show');
                        }
                    })
                    .catch(err => console.error('Autocomplete error:', err));
            }, 300);
        });
        
        function selectSuggestion(text) {
            searchInput.value = text;
            autocompleteDiv.classList.remove('show');
            search();
        }
        
        // Search - Multi-layer intelligent search
        async function search() {
            const query = searchInput.value;
            if (!query) return;

            errorDiv.innerHTML = '';
            resultsDiv.innerHTML = '<div class="loading">🔍 Buscando...</div>';

            try {
                const response = await fetch(`${API_URL}/api/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                // Mostrar qual método foi usado
                const methodLabels = {
                    'full-text': '🔍 Full-text Search (com sinônimos)',
                    'fuzzy': '🔀 Fuzzy Match',
                    'vector': '🧠 Vector Search (semântica)'
                };

                const methodLabel = methodLabels[data.searchMethod] || 'Busca';
                displayResults(data, methodLabel);
            } catch (err) {
                showError('Erro na busca: ' + err.message);
            }
        }
        
        // Vector Search
        async function vectorSearch() {
            const query = searchInput.value;
            if (!query) return;
            
            errorDiv.innerHTML = '';
            resultsDiv.innerHTML = '<div class="loading">🧠 Buscando semanticamente...</div>';
            
            try {
                const response = await fetch(`${API_URL}/api/vector-search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                displayResults(data, 'Vector Search (Semântica)');
            } catch (err) {
                showError('Erro na busca vetorial: ' + err.message);
            }
        }
        
        function displayResults(data, method) {
            if (data.error) {
                showError(data.error);
                return;
            }

            const games = data.games || [];

            if (games.length === 0) {
                resultsDiv.innerHTML = '<div class="loading">😕 Nenhum resultado encontrado</div>';
                return;
            }

            // Mostrar métodos de busca usados
            const searchMethods = data.searchMethods || [];
            const methodBadges = searchMethods.map(m => {
                const badges = {
                    'fts': '<span class="badge badge-fts">🔍 FTS</span>',
                    'fuzzy': '<span class="badge badge-fuzzy">🔀 Fuzzy</span>',
                    'vector': '<span class="badge badge-vector">🧠 Vector</span>'
                };
                return badges[m] || '';
            }).join('');

            let html = `<div class="stats">📊 ${data.total} resultados encontrados ${methodBadges ? '• Métodos: ' + methodBadges : ''}</div>`;

            games.forEach(game => {
                const nome = game.nome || game['$.nome'] || 'Sem nome';
                const provider = game.provider || game['$.provider'] || 'Desconhecido';
                const descricao = game.description || game.descricao || game['$.descricao'] || '';
                const score = game.score !== undefined ? game.score : null;

                // Badges de método para cada jogo (se disponível)
                let gameBadges = '';
                if (game.matchedBy) {
                    const methodMap = {
                        'fts': '<span class="badge badge-fts">FTS</span>',
                        'fuzzy': '<span class="badge badge-fuzzy">Fuzzy</span>',
                        'vector': '<span class="badge badge-vector">Vector</span>'
                    };
                    gameBadges = `<div class="badges">${methodMap[game.matchedBy] || ''} ${score !== null ? `<span class="score">Score: ${score.toFixed(2)}</span>` : ''}</div>`;
                } else if (score !== null) {
                    gameBadges = `<div class="badges"><span class="score">Score: ${score.toFixed(2)}</span></div>`;
                }

                html += `
                    <div class="result-item">
                        <div class="result-title">${nome}</div>
                        <div class="result-provider">${provider}</div>
                        ${gameBadges}
                        ${descricao ? `<div class="result-description">${descricao}</div>` : ''}
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }
        
        function showError(message) {
            errorDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
            resultsDiv.innerHTML = '';
        }
        
        // Enter para buscar
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                search();
            }
        });
        
        // Fechar autocomplete ao clicar fora
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !autocompleteDiv.contains(e.target)) {
                autocompleteDiv.classList.remove('show');
            }
        });
    </script>
</body>
</html>
